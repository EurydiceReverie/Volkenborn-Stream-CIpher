name: Volkenborn-2 Rust CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Unit tests
        run: cargo test

      - name: Random cross-check tests
        run: cargo test --test random_crosscheck

      - name: Benchmark smoke
        run: cargo run --release --bin v2bench -- 4096 2

      - name: Fuzz smoke
        run: cargo run --release --bin v2fuzz -- 128 256

      - name: Streaming roundtrip on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          key=000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
          nonce=202122232425262728292a2b2c2d2e2f
          dd if=/dev/urandom bs=64 count=1 2>/dev/null > plain.bin
          target/release/v2tool sealp "$key" "$nonce" < plain.bin > sealed.bin 2>/dev/null
          target/release/v2tool openp "$key" "$nonce" < sealed.bin > recovered.bin 2>/dev/null
          cmp plain.bin recovered.bin && echo "Streaming roundtrip: PASS"

      - name: Streaming roundtrip on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $key='000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f'
          $nonce='202122232425262728292a2b2c2d2e2f'
          $rng = [System.Security.Cryptography.RandomNumberGenerator]::Create()
          $plain = New-Object byte[] 64
          $rng.GetBytes($plain)
          [IO.File]::WriteAllBytes('plain.bin', $plain)
          $v2tool = "target\release\v2tool.exe"
          cmd /c "$v2tool sealp $key $nonce < plain.bin > sealed.bin 2>nul"
          cmd /c "$v2tool openp $key $nonce < sealed.bin > recovered.bin 2>nul"
          if (Compare-Object ([IO.File]::ReadAllBytes('plain.bin')) ([IO.File]::ReadAllBytes('recovered.bin')) -SyncWindow 0) { throw 'FAIL' }
          Write-Host 'Streaming roundtrip: PASS'
